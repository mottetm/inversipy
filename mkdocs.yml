site_name: inversipy
site_description: A powerful and type-safe dependency injection/IoC library for Python
site_url: https://mottetm.github.io/inversipy
repo_url: https://github.com/mottetm/inversipy
repo_name: mottetm/inversipy

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - content.code.copy
    - navigation.sections
    - navigation.expand
    - toc.follow

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Core Concepts:
    - Container: core/container.md
    - Scopes: core/scopes.md
    - Modules: core/modules.md
  - Injection Patterns:
    - Constructor Injection: injection/constructor.md
    - Property Injection: injection/property.md
    - Function Injection: injection/function.md
    - Named Dependencies: injection/named.md
    - Collection Injection: injection/collection.md
    - Optional Dependencies: injection/optional.md
  - Integrations:
    - FastAPI: integrations/fastapi.md
    - Flask: integrations/flask.md
    - Click: integrations/click.md
    - Pytest: integrations/pytest.md
  - Advanced:
    - Validation: advanced/validation.md
    - Container Freezing: advanced/freezing.md
    - Parent-Child Containers: advanced/hierarchy.md
    - Testing: advanced/testing.md
  - Best Practices: best-practices.md
